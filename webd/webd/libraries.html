<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Libraries List</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      padding: 40px;
    }
    .card {
      background: #fff;
      padding: 20px;
      margin: 20px auto;
      width: 400px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .card h2 {
      margin: 0 0 10px;
    }
    .card p {
      margin: 4px 0;
    }
    .card a {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 20px;
      background: #007bff;
      color: #fff;
      text-decoration: none;
      border-radius: 4px;
    }
    .card a:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>

  <h1>Libraries</h1>

  <div class="card">
    <h2>Central Library</h2>
    <p>Address: Near Allen Institute, Kota</p>
    <p>Phone: 0900000100</p>
    <p>Rating: 4.6 ⭐</p>
    <a href="library_booking.html?libraryName=Central%20Library">Book Now</a>
  </div>

  <div class="card">
    <h2>City Library</h2>
    <p>Address: JLN Road, Kota</p>
    <p>Phone: 0900000101</p>
    <p>Rating: 4.4 ⭐</p>
    <a href="library_booking.html?libraryName=City%20Library">Book Now</a>
  </div>

</body>
</html>
