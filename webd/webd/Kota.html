<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kota - StaySync</title>
  <style>
    body {
      background-image: url(main-bg.jpg);
      background-repeat: no-repeat;
      background-size: cover;
      height: 100%;
    }
    .title {
      font-size: 40px;
      color: white;
      font-family: cursive;
      margin: 30px 0 15px 20px;
      display: inline-block;
    }
    .header {
      background-color: #484f4f;
      height: 200px;
    }
    .login-signup {
      position: absolute;
      right: 50px;
      top: 50px;
      text-decoration: none;
      font-family: 'Times New Roman', Times, serif;
      color: white;
      font-size: large;
    }
    .categories {
      display: inline-block;
      margin: 100px 80px;
    }
    .buttons {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 190px;
      height: 300px;
      background-color: #563f46;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: Arial, sans-serif;
      font-size: 16px;
      cursor: pointer;
    }
    .buttons:hover {
      background-color: #484f4f;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="title">staySync</div>
    <a class="login-signup" href="Login.html">Login / SignUp</a>
  </header>

  <div class="categories">
    <button class="buttons" onclick="window.location.href='Kota-pg.html';">
      <svg xmlns="http://www.w3.org/2000/svg" width="50" height="30" fill="currentColor" class="bi bi-house" viewBox="0 0 16 16">
        <path d="..."/>

      <span>Hostels/PG</span>
    </button>
  </div>

  <div class="categories">
    <button class="buttons" onclick="window.location.href='Kota-institute.html';">
      <svg xmlns="http://www.w3.org/2000/svg" width="50" height="30" fill="currentColor" class="bi bi-mortarboard" viewBox="0 0 16 16">
        <path d="..."/>
      </svg>
      <span>Institutes</span>
    </button>
  </div>

  <div class="categories">
    <button class="buttons" onclick="window.location.href='kota-library.html';">
      <svg xmlns="http://www.w3.org/2000/svg" width="50" height="30" fill="currentColor" class="bi bi-pencil" viewBox="0 0 16 16">
        <path d="..."/>
      </svg>
      <span>Libraries</span>
    </button>
  </div>

  <div class="categories">
    <button class="buttons" onclick="window.location.href='kota-hospital.html';">
      <svg xmlns="http://www.w3.org/2000/svg" width="50" height="30" fill="currentColor" class="bi bi-hospital" viewBox="0 0 16 16">
        <path d="..."/>
      </svg>
      <span>Hospitals</span>
    </button>
  </div>

</html>
