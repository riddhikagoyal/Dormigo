<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Veggie It</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-image">
            <img src="https://c4.wallpaperflare.com/wallpaper/663/737/291/vegetables-assorted-basket-wallpaper-preview.jpg" alt="Veggie It">
        </div>
        <div class="login-form">
            <h2>Welcome Back to Veggie It 🥦</h2>
            <p>Login to access fresh and organic groceries!</p>
            <form>
                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="Enter your email" required>
                
                <label for="password">Password:</label>
                <input type="password" id="password" placeholder="Enter your password" required>

                <div class="forgot-password">
                    <a href="#">Forgot Password?</a>
                </div>

                <button type="submit">Login</button>

                <p class="or-text">or login with</p>

                <div class="social-buttons">
                    <button class="google-btn">Google</button>
                    <button class="facebook-btn">Facebook</button>
                </div>

                <p class="signup-text">Don't have an account? <a href="#">Sign Up</a></p>
            </form>
        </div>
    </div>
</body>
</html>
