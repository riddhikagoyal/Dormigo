<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUR - Event Registration</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>SUR - Singing Competition</h1>
        <p>Registration for Pravah's Annual Fest</p>
        <form action="#" method="POST" id="registration-form">
            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" required>

            <label for="contact">Contact Number:</label>
            <input type="tel" id="contact" name="contact" required>

            <label for="song">Song Choice:</label>
            <input type="text" id="song" name="song" placeholder="Enter the song you will perform" required>

            <label for="experience">Experience Level:</label>
            <select id="experience" name="experience" required>
                <option value="" disabled selected>Select your experience level</option>
                <option value="beginner">Beginner</option>
                <option value="intermediate">Intermediate</option>
                <option value="advanced">Advanced</option>
            </select>

            <button type="submit">Register</button>
        </form>
    </div>
</body>
</html>
