<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Veggie It</title>
    <link rel="stylesheet" href="styless.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>🥦 Veggie It - Your Cart</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="#">Shop</a></li>
                <li><a href="#">Best Sellers</a></li>
                <li><a href="#">Contact</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </nav>
    </header>

    <section class="cart-container">
        <h2>Your Shopping Cart 🛒</h2>
        <div class="cart-items">
            <div class="cart-item">
                <img src="https://via.placeholder.com/100/C8E6C9/FFFFFF?text=Tomatoes" alt="Tomatoes">
                <div class="item-details">
                    <h3>Fresh Tomatoes 🍅</h3>
                    <p>$2.99/kg</p>
                    <input type="number" value="1" min="1" class="quantity">
                </div>
                <p class="item-total">$2.99</p>
                <button class="remove-btn">Remove</button>
            </div>

            <div class="cart-item">
                <img src="https://via.placeholder.com/100/A5D6A7/FFFFFF?text=Broccoli" alt="Broccoli">
                <div class="item-details">
                    <h3>Organic Broccoli 🥦</h3>
                    <p>$3.49/kg</p>
                    <input type="number" value="1" min="1" class="quantity">
                </div>
                <p class="item-total">$3.49</p>
                <button class="remove-btn">Remove</button>
            </div>

            <div class="cart-item">
                <img src="https://via.placeholder.com/100/FFCC80/FFFFFF?text=Carrots" alt="Carrots">
                <div class="item-details">
                    <h3>Crunchy Carrots 🥕</h3>
                    <p>$1.99/kg</p>
                    <input type="number" value="1" min="1" class="quantity">
                </div>
                <p class="item-total">$1.99</p>
                <button class="remove-btn">Remove</button>
            </div>
        </div>

        <div class="cart-summary">
            <h3>Total: <span id="cart-total">$8.47</span></h3>
            <button class="checkout-btn">Proceed to Checkout</button>
        </div>
    </section>

    <footer>
        <p>© 2025 Veggie It | Fresh & Organic 🌱</p>
    </footer>
</body>
</html>
