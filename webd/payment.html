<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Payment Options</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background-image: url("pay.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(4px);
    }
    .section {
      display: none;
      margin-top: 20px;
      background: #f9f9f9;
      padding: 15px;
      border-radius: 8px;
    }
    .qr-section img {
      width: 200px;
      margin-top: 10px;
    }
    .section small {
      display: block;
      margin-top: 10px;
      color: #666;
    }
  </style>
</head>
<body>

<div class="card p-4 shadow-lg text-center" style="width: 300px;">
  <h2 class="mb-4">Select Payment Method</h2>

  <button class="btn btn-primary mb-2 upi-btn">Pay via UPI</button>
  <button class="btn btn-info mb-2 qr-btn">Pay via QR Code</button>
  <button class="btn btn-secondary mb-3 card-btn">Pay via Card/Netbanking</button>

  <div class="section upi-section">
    <p><strong>UPI ID:</strong> yourupi@bank</p>
    <small>Use any UPI app to pay (e.g. GPay, PhonePe)</small>
    <button class="btn btn-success w-100 mt-3 proceed-btn" data-method="UPI">Payment Done</button>
  </div>

  <div class="section qr-section">
    <p>Scan this QR Code to Pay:</p>
    <img src="qr.jpg" alt="QR Code" class="img-fluid rounded">
    <button class="btn btn-success w-100 mt-3 proceed-btn" data-method="QR">Payment Done</button>
  </div>

  <div class="section card-section">
    <p>Redirecting to payment gateway...</p>
    <small>This is a placeholder. Add your actual gateway link.</small>
    <button class="btn btn-success w-100 mt-3 proceed-btn" data-method="Card">Payment Done</button>
  </div>
</div>

<script>
  const API = "http://127.0.0.1:5000"; 
  const params = new URLSearchParams(window.location.search);
  const bookingId = params.get("bookingId");
  const token = localStorage.getItem("token");

  // ✅ Guard: bookingId required
  if (!bookingId) {
    alert("Invalid booking link. No bookingId provided.");
    window.location.href = "bookings.html";
  }

  // ✅ Guard: must be logged in
  if (!token) {
    alert("You must be logged in to continue.");
    window.location.href = "login.html";
  }

  let currentBooking = null;

  async function loadBooking() {
    try {
      const res = await fetch(`${API}/api/bookings/${bookingId}`, {
        headers: { "Authorization": "Bearer " + token }
      });

      const data = await res.json();

      if (!res.ok) {
        alert(data.msg || "Error loading booking");
        return;
      }

      currentBooking = data;
      console.log("Loaded booking:", currentBooking);
    } catch (err) {
      console.error(err);
      alert("Error fetching booking");
    }
  }

  loadBooking();

  // Payment buttons
  const upiBtn = document.querySelector('.upi-btn');
  const qrBtn = document.querySelector('.qr-btn');
  const cardBtn = document.querySelector('.card-btn');

  const upiSection = document.querySelector('.upi-section');
  const qrSection = document.querySelector('.qr-section');
  const cardSection = document.querySelector('.card-section');

  function hideAll() {
    upiSection.style.display = 'none';
    qrSection.style.display = 'none';
    cardSection.style.display = 'none';
  }

  upiBtn.addEventListener('click', () => { hideAll(); upiSection.style.display = 'block'; });
  qrBtn.addEventListener('click', () => { hideAll(); qrSection.style.display = 'block'; });
  cardBtn.addEventListener('click', () => { hideAll(); cardSection.style.display = 'block'; });

  // Confirm payment
  const proceedBtns = document.querySelectorAll('.proceed-btn');
  proceedBtns.forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!currentBooking) return alert("Booking not found!");

      const paymentMethod = btn.getAttribute('data-method');

      // prevent double clicks
      btn.disabled = true;
      btn.textContent = "Processing...";

      try {
        const res = await fetch(`${API}/api/bookings/${bookingId}/pay`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
          },
          body: JSON.stringify({ payment: paymentMethod, status: "Confirmed" })
        });

        const data = await res.json();
        if (!res.ok) {
          alert(data.msg || "Payment update failed");
          btn.disabled = false;
          btn.textContent = "Payment Done";
          return;
        }

        alert("✅ Payment successful!");
        window.location.href = `confirmation.html?bookingId=${bookingId}`;
      } catch (err) {
        console.error(err);
        alert("Error updating payment");
        btn.disabled = false;
        btn.textContent = "Payment Done";
      }
    });
  });
</script>

</body>
</html>
