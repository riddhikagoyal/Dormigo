<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Libraries List</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <h1 class="text-center mb-5">Libraries</h1>

      <div class="row justify-content-center">
        <!-- Card 1 -->
        <div class="col-md-6 col-lg-4">
          <div class="card shadow-sm mb-4">
            <div class="card-body">
              <h5 class="card-title">Central Library</h5>
              <p class="card-text mb-1">
                <strong>Address:</strong> Near Allen Institute, Kota
              </p>
              <p class="card-text mb-1"><strong>Phone:</strong> 0900000100</p>
              <p class="card-text"><strong>Rating:</strong> 4.6 ⭐</p>
              <a
                href="library_booking.html?libraryName=Central%20Library"
                class="btn btn-primary mt-2"
                >Book Now</a
              >
            </div>
          </div>
        </div>

        <!-- Card 2 -->
        <div class="col-md-6 col-lg-4">
          <div class="card shadow-sm mb-4">
            <div class="card-body">
              <h5 class="card-title">City Library</h5>
              <p class="card-text mb-1">
                <strong>Address:</strong> JLN Road, Kota
              </p>
              <p class="card-text mb-1"><strong>Phone:</strong> 0900000101</p>
              <p class="card-text"><strong>Rating:</strong> 4.4 ⭐</p>
              <a
                href="library_booking.html?libraryName=City%20Library"
                class="btn btn-primary mt-2"
                >Book Now</a
              >
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
