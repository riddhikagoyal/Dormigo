<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Booking Page</title>
  <!-- Bootstrap CSS CDN -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <style>
    body {
      background-image: url("book.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .booking-card {
      width: 100%;
      max-width: 650px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      background: #fff;
      overflow: hidden;
      animation: fadeInUp 0.6s ease;
    }

    .booking-header {
      background: linear-gradient(135deg, #007bff, #00c6ff);
      color: #fff;
      padding: 20px;
      text-align: center;
    }

    .booking-header h1 {
      font-size: 1.8rem;
      margin: 0;
    }

    .form-label {
      font-weight: 500;
    }

    .btn-custom {
      background: linear-gradient(135deg, #007bff, #00c6ff);
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 1rem;
      transition: 0.3s;
    }

    .btn-custom:hover {
      opacity: 0.9;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="booking-card">
    <div class="booking-header">
      <h1>Booking Form</h1>
    </div>
    <div class="p-4">
      <form id="bookingForm" class="row g-3">
        <!-- Booking Type -->
        <div class="col-md-6">
          <label for="type" class="form-label">Booking Type</label>
          <input type="text" id="type" name="type" class="form-control" readonly />
        </div>

        <!-- Booking For -->
        <div class="col-md-6">
          <label for="for" class="form-label">Booking For</label>
          <input type="text" id="for" name="for" class="form-control" readonly />
        </div>

        <!-- Your Name -->
        <div class="col-md-6">
          <label for="name" class="form-label">Your Name</label>
          <input type="text" id="name" name="name" class="form-control" required />
        </div>

        <!-- Contact Number -->
        <div class="col-md-6">
          <label for="contact" class="form-label">Contact Number</label>
          <input type="tel" id="contact" name="contact" class="form-control" required />
        </div>

        <!-- Email (auto-filled) -->
        <div class="col-md-6">
          <label for="email" class="form-label">Email Address</label>
          <input type="email" id="email" name="email" class="form-control" placeholder="e.g. abc@example.com" required />

        </div>

        <!-- Date -->
        <div class="col-md-6">
          <label for="date" class="form-label">Booking Date</label>
          <input type="date" id="date" name="date" class="form-control" required />
        </div>

        <!-- Time Slot -->
        <div class="col-md-6">
          <label for="time" class="form-label">Preferred Time Slot</label>
          <select id="time" name="time" class="form-select" required>
            <option value="">Select</option>
            <option>Morning (9 AM - 12 PM)</option>
            <option>Afternoon (12 PM - 3 PM)</option>
            <option>Evening (3 PM - 6 PM)</option>
          </select>
        </div>

        <!-- Age -->
        <div class="col-md-6">
          <label for="age" class="form-label">Age</label>
          <input type="number" id="age" name="age" class="form-control" min="1" />
        </div>

        <!-- Gender -->
        <div class="col-md-6">
          <label for="gender" class="form-label">Gender</label>
          <select id="gender" name="gender" class="form-select">
            <option value="">Select</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
          </select>
        </div>

        <!-- Notes -->
        <div class="col-12">
          <label for="notes" class="form-label">Special Requirements / Notes</label>
          <textarea id="notes" name="notes" class="form-control" rows="3"></textarea>
        </div>

        <!-- Submit -->
        <div class="col-12">
          <button type="submit" class="btn btn-custom w-100">
            Proceed to Payment
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- JS -->
<script>
  const form = document.getElementById("bookingForm");

  form.addEventListener("submit", async function (e) {
    e.preventDefault();

    const bookingData = {
      category: document.getElementById("type").value,
      itemId: document.getElementById("for").value,
      name: document.getElementById("name").value,
      phone: document.getElementById("contact").value,
      email: document.getElementById("email").value,
      dateFrom: document.getElementById("date").value,
      dateTo: document.getElementById("date").value,
      details: {
        time: document.getElementById("time").value,
        age: document.getElementById("age").value,
        gender: document.getElementById("gender").value,
        notes: document.getElementById("notes").value,
      }
    };

    const params = new URLSearchParams(window.location.search);
  const type = params.get("type") || "";
  const name = params.get("name") || "";

  // Fill the inputs
  document.getElementById("type").value = type;
  document.getElementById("for").value = name;

  // Make them uneditable
  document.getElementById("type").readOnly = true;
  document.getElementById("for").readOnly = true;

    try {
      const token = localStorage.getItem("token"); // stored at login
      if (!token) {
        alert("Please login first!");
        return;
      }

      const res = await fetch("http://127.0.0.1:5000/api/bookings", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token   // 🔹 attach token
        },
        body: JSON.stringify(bookingData),
      });

      const data = await res.json();
      if (!res.ok) {
        alert(data.msg || "Booking failed");
        return;
      }

      alert("Booking successful!");
      console.log("Booking created:", data);

      // redirect to payment
      window.location.href = `payment.html?bookingId=${data.booking._id}`;
    } catch (err) {
      console.error(err);
      alert("Error submitting booking");
    }
  });
</script>

</body>
</html>
