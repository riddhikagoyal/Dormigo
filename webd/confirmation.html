<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Booking Confirmation</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background-image: url("thankyou.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .confirmation-card {
      background: rgba(255, 255, 255, 0.95);
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      text-align: center;
    }
  </style>
</head>
<body>

<div class="confirmation-card">
  <h1 class="text-success mb-4">✅ Booking Confirmed!</h1>
  <p><strong>Booking ID:</strong> <span id="bookingId"></span></p>
  <p><strong>Booking Type:</strong> <span id="bookingType"></span></p>
  <p><strong>Booking For:</strong> <span id="bookingFor"></span></p>
  <p><strong>Your Name:</strong> <span id="studentName"></span></p>
  <p><strong>Payment Method:</strong> <span id="paymentMethod"></span></p>

  <a href="staySync.html" class="btn btn-primary mt-4">Back to Home</a>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const bookingId = params.get('bookingId');

  const allBookings = JSON.parse(localStorage.getItem('bookings') || '[]');
  const booking = allBookings.find(b => b.id === bookingId);

  if (booking) {
    document.getElementById('bookingId').textContent = booking.id;
    document.getElementById('bookingType').textContent = booking.type;
    document.getElementById('studentName').textContent = booking.name;
    document.getElementById('paymentMethod').textContent = booking.payment;

    // Check type and show appropriate field
    if (booking.type === "Ambulance") {
      document.getElementById('bookingFor').textContent = `From ${booking.pickup} to ${booking.destination}`;
    } else {
      document.getElementById('bookingFor').textContent = booking.for;
    }

  } else {
    document.querySelector('.confirmation-card').innerHTML = `<h3 class="text-danger">❌ Booking not found!</h3>`;
  }
</script>


</body>
</html>
